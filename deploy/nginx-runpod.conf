# Single public port (8000) on RunPod: split traffic between two FastAPI apps.
#
# Upstreams (start these first):
#   - RAG Builder / vocalize API: 127.0.0.1:8001  (uvicorn main:app --port 8001)
#   - Product RAG (cloud demo):   127.0.0.1:8002  (your existing app)
#
# Run nginx (foreground, good for containers):
#   nginx -c /path/to/rag-builder/deploy/nginx-runpod.conf -g 'daemon off;'
#
# Requires: apt-get install -y nginx

worker_processes auto;
error_log stderr warn;
pid /tmp/nginx-runpod.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout combined;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    upstream rag_builder {
        server 127.0.0.1:8001;
        keepalive 8;
    }

    upstream product_rag {
        server 127.0.0.1:8002;
        keepalive 8;
    }

    # Shared proxy defaults for APIs + SSE
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    server {
        listen 8000;
        server_name _;

        client_max_body_size 200m;

        # Browser preflight for Vercel → RunPod (avoids "CORS failed" with status null if OPTIONS breaks).
        # POST/GET still go to FastAPI (which also sets CORS). Wildcard is OK: we use no cookies on this API.
        location /assistant {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0 always;
                return 204;
            }
            # Strip upstream CORS so we emit one consistent policy (fixes custom domains like vocalize.enbquantum.com).
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            proxy_pass http://rag_builder;
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            proxy_set_header Connection "";
            chunked_transfer_encoding on;
        }

        location /models {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0 always;
                return 204;
            }
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            proxy_pass http://rag_builder;
            proxy_buffering off;
            proxy_cache off;
        }

        # Builder liveness without stealing /health from product-rag
        location = /health/builder {
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin "*" always;
            proxy_pass http://127.0.0.1:8001/health;
            proxy_buffering off;
        }

        # --- Product RAG: everything else (/, /stream, /ask, /docs, etc.)
        # NOTE: Public https://…/docs is product-rag on :8002. If you see 502, uvicorn on 8002
        # is not running or crashed — see /tmp/rag-builder-stack/product-rag.log
        # Vocalize (builder) Swagger is on :8001 only: curl http://127.0.0.1:8001/docs (from the pod).
        location / {
            proxy_pass http://product_rag;
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            proxy_set_header Connection "";
            chunked_transfer_encoding on;
        }
    }
}
