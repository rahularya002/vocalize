# Single public port (8000) on RunPod: split traffic between two FastAPI apps.
#
# Upstreams (start these first):
#   - RAG Builder / vocalize API: 127.0.0.1:8001  (uvicorn main:app --port 8001)
#   - Product RAG (cloud demo):   127.0.0.1:8002  (your existing app)
#
# Run nginx (foreground, good for containers):
#   nginx -c /path/to/rag-builder/deploy/nginx-runpod.conf -g 'daemon off;'
#
# Requires: apt-get install -y nginx

worker_processes auto;
error_log stderr warn;
pid /tmp/nginx-runpod.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout combined;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    upstream rag_builder {
        server 127.0.0.1:8001;
        keepalive 8;
    }

    upstream product_rag {
        server 127.0.0.1:8002;
        keepalive 8;
    }

    # Shared proxy defaults for APIs + SSE
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    server {
        listen 8000;
        server_name _;

        client_max_body_size 200m;

        # --- RAG Builder (this repo): /assistant/*, /models, optional /health/builder
        location /assistant {
            proxy_pass http://rag_builder;
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            proxy_set_header Connection "";
            chunked_transfer_encoding on;
        }

        location /models {
            proxy_pass http://rag_builder;
            proxy_buffering off;
            proxy_cache off;
        }

        # Builder liveness without stealing /health from product-rag
        location = /health/builder {
            proxy_pass http://127.0.0.1:8001/health;
            proxy_buffering off;
        }

        # --- Product RAG: everything else (/, /stream, /ask, /docs, etc.)
        location / {
            proxy_pass http://product_rag;
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            proxy_set_header Connection "";
            chunked_transfer_encoding on;
        }
    }
}
